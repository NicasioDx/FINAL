services:
  database:
    image: postgres:13
    container_name: parking-db
    environment:
      POSTGRES_DB: parking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: parking-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:1234@database:5432/parking_db
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/yolov8n.pt:/app/yolov8n.pt
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: