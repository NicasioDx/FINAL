<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parking ROI Marker</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      --bg: #eef3fb;
      --bg-soft: #f8fbff;
      --panel: #ffffff;
      --ink: #11203a;
      --muted: #60708a;
      --line: #d9e2ef;
      --line-strong: #c7d4e8;
      --green: #0f9d58;
      --blue: #1f5eff;
      --red: #dc3d3d;
      --shadow: 0 10px 28px rgba(17, 32, 58, 0.12);
      --shadow-soft: 0 4px 14px rgba(17, 32, 58, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--line-strong);
      box-shadow: var(--shadow-soft);
      position: sticky;
      top: 0;
      z-index: 4;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .field {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 10px;
      height: 38px;
      background: #fff;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    button, input {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      height: 38px;
      padding: 0 12px;
      font-size: 14px;
      transition: all 0.18s ease;
    }

    input {
      width: 94px;
      border-color: var(--line-strong);
    }

    input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 94, 255, 0.16);
    }

    button {
      cursor: pointer;
      font-weight: 700;
      border-color: var(--line-strong);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
    }

    button:active {
      transform: translateY(0);
    }

    button.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    button.danger {
      color: #fff;
      background: var(--red);
      border-color: var(--red);
    }

    main {
      max-width: 1600px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 16px;
      padding: 18px;
    }

    .stage {
      background: #0c1117;
      border: 1px solid #1f2c3f;
      border-radius: 14px;
      overflow: auto;
      min-height: 300px;
      box-shadow: var(--shadow);
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 1200px;
      height: auto;
      cursor: crosshair;
    }

    aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow-soft);
      padding: 14px;
      min-height: 300px;
    }

    .status {
      color: #2a3b57;
      background: #f2f6fd;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      margin: 0 0 12px;
      padding: 10px;
    }

    .slot-list {
      display: grid;
      gap: 6px;
      max-height: calc(100vh - 180px);
      overflow: auto;
    }

    .slot-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      background: #fff;
      line-height: 1.35;
      color: #22324d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .slot-item .slot-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1 1 auto;
      margin-right: 8px;
    }

    .slot-item .delete-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--red);
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
    }

    .slot-item .delete-btn:hover {
      background: rgba(220, 61, 61, 0.08);
    }

    .slot-item.active {
      border-color: var(--green);
      box-shadow: inset 3px 0 0 var(--green);
      background: #f4fff7;
    }

    @media (max-width: 900px) {
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      main { grid-template-columns: 1fr; }
      aside { min-height: 0; }
      canvas { max-width: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="pageTitle">Parking ROI Marker</h1>
    <div class="toolbar">
      <label class="field">Frame second <input id="secondInput" type="number" value="50" min="0" step="1"></label>
      <button id="reloadBtn">Reload frame</button>
      <button id="undoPointBtn">Undo point</button>
      <button id="undoSlotBtn">Undo slot</button>
      <button id="clearBtn" class="danger">Clear</button>
      <button id="saveBtn" class="primary">Save ROI</button>
    </div>
  </header>

  <main>
    <section class="stage">
      <canvas id="canvas" width="960" height="540"></canvas>
    </section>
    <aside>
      <p class="status" id="status"></p>
      <div class="slot-list" id="slotList"></div>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const slotListEl = document.getElementById('slotList');
    const secondInput = document.getElementById('secondInput');
    const pageTitleEl = document.getElementById('pageTitle');

    const image = new Image();
    let rois = [];
    let current = [];
    const imageSize = [960, 540];
    const params = new URLSearchParams(window.location.search);
    const cameraId = params.get('camera_id');

    if (cameraId) {
      pageTitleEl.textContent = `Parking ROI Marker - Camera ${cameraId}`;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return [
        Math.round((event.clientX - rect.left) * scaleX),
        Math.round((event.clientY - rect.top) * scaleY)
      ];
    }

    function drawPoint(point, color, label) {
      ctx.beginPath();
      ctx.arc(point[0], point[1], 5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#ffffff';
      ctx.stroke();
      if (label) {
        ctx.font = '14px Arial';
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#000000';
        ctx.strokeText(label, point[0] + 7, point[1] - 7);
        ctx.fillStyle = color;
        ctx.fillText(label, point[0] + 7, point[1] - 7);
      }
    }

    function drawLabel(point, label, color) {
      if (!point) return;
      ctx.font = '18px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#ffffff';
      ctx.strokeText(label, point[0], point[1]);
      ctx.fillStyle = color;
      ctx.fillText(label, point[0], point[1]);
    }

    function polygonCentroid(points) {
      if (!points.length) return null;
      const sum = points.reduce((acc, point) => {
        acc[0] += point[0];
        acc[1] += point[1];
        return acc;
      }, [0, 0]);
      return [sum[0] / points.length, sum[1] / points.length];
    }

    function drawPolygon(points, color, width) {
      if (!points.length) return;
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (const point of points.slice(1)) ctx.lineTo(point[0], point[1]);
      if (points.length >= 3) ctx.closePath();
      ctx.lineWidth = width;
      ctx.strokeStyle = color;
      ctx.stroke();
      if (points.length >= 3) {
        ctx.fillStyle = 'rgba(0, 181, 45, 0.12)';
        ctx.fill();
      }
    }

    function redraw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (image.complete && image.naturalWidth) {
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
      }

      rois.forEach((roi, index) => {
        drawPolygon(roi.points, '#00c83c', 3);
        roi.points.forEach(point => drawPoint(point, '#00c83c'));
        const center = polygonCentroid(roi.points);
        if (center) drawLabel(center, String(index + 1), '#0c3d08');
      });

      drawPolygon(current, '#2558d8', 3);
      current.forEach((point, index) => drawPoint(point, '#2558d8', String(index + 1)));

      renderList();
      setStatus(`Saved slots: ${rois.length}. Current slot points: ${current.length}/4. Click 4 corners clockwise or counter-clockwise.`);
    }

    function renderList() {
      slotListEl.innerHTML = '';
        rois.forEach((roi, index) => {
        const item = document.createElement('div');
        item.className = 'slot-item';
        const text = document.createElement('div');
        text.className = 'slot-text';
        text.textContent = `${index + 1}: ${roi.points.map(point => `[${point[0]},${point[1]}]`).join(' ')}`;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = 'Delete';
        del.title = `Delete slot ${index + 1}`;
        del.addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (!confirm(`Delete slot ${index + 1}?`)) return;
          rois.splice(index, 1);
          redraw();
        });

        item.appendChild(text);
        item.appendChild(del);
        slotListEl.appendChild(item);
      });
      if (current.length) {
        const item = document.createElement('div');
        item.className = 'slot-item active';
        const text = document.createElement('div');
        text.className = 'slot-text';
        text.textContent = `New: ${current.map(point => `[${point[0]},${point[1]}]`).join(' ')}`;
        item.appendChild(text);
        slotListEl.appendChild(item);
      }
    }

    function addPoint(point) {
      current.push(point);
      if (current.length === 4) {
        rois.push({ points: current });
        current = [];
      }
      redraw();
    }

    async function loadData() {
      const url = cameraId ? `/roi_marker/data?camera_id=${encodeURIComponent(cameraId)}` : '/roi_marker/data';
      const response = await fetch(url);
      if (!response.ok) throw new Error(await response.text());
      const data = await response.json();
      rois = Array.isArray(data.rois) ? data.rois.filter(roi => Array.isArray(roi.points)) : [];
      current = [];
      redraw();
    }

    function loadFrame() {
      const second = Number(secondInput.value || 0);
      const query = new URLSearchParams({
        second: String(second),
        t: String(Date.now()),
      });
      if (cameraId) {
        query.set('camera_id', cameraId);
      }
      image.src = `/roi_marker/frame?${query.toString()}`;
    }

    async function save() {
      const response = await fetch('/roi_marker/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          camera_id: cameraId ? Number(cameraId) : null,
          image_size: imageSize,
          rois
        })
      });
      if (!response.ok) throw new Error(await response.text());
      const data = await response.json();
      setStatus(data.scope === 'camera'
        ? `Saved ${data.slots} slots for camera ${data.camera_id}`
        : `Saved ${data.slots} slots to manual_rois.json`);
    }

    canvas.addEventListener('click', event => addPoint(canvasPoint(event)));
    image.addEventListener('load', redraw);
    image.addEventListener('error', () => {
      setStatus('Load frame failed: ตรวจสอบ source ของกล้องหรือไฟล์วิดีโอ');
      redraw();
    });

    document.getElementById('reloadBtn').addEventListener('click', loadFrame);
    document.getElementById('undoPointBtn').addEventListener('click', () => {
      current.pop();
      redraw();
    });
    document.getElementById('undoSlotBtn').addEventListener('click', () => {
      if (current.length) current = [];
      else rois.pop();
      redraw();
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('Clear all marked slots?')) {
        rois = [];
        current = [];
        redraw();
      }
    });
    document.getElementById('saveBtn').addEventListener('click', () => {
      save().catch(error => setStatus(`Save failed: ${error.message}`));
    });

    loadFrame();
    loadData().catch(error => setStatus(`Load failed: ${error.message}`));
  </script>
</body>
</html>
